version: 2

project_name: pulumi-resource-zitadel

dist: dist

release:
  disable: false

builds:
  - id: pulumi-resource-zitadel
    dir: provider
    main: ./cmd/pulumi-resource-zitadel/
    binary: pulumi-resource-zitadel
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/truvity/pulumi-zitadel/provider/pkg/version.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: provider-archive
    ids:
      - pulumi-resource-zitadel
    name_template: "{{ .Binary }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"
